<!DOCTYPE html>
<html>
<body>
  <h2>Multiplication Table (2 x 1 = 2)</h2>
  <div id="result"></div>
  <script>
    let i = 1;
    let output = ""; 
    while (i <= 10) {
      output += "2 x " + i + " = " + (2 * i) + "<br>";
      i++; 
    }
    document.getElementById("result").innerHTML = output;
  </script>

</body>
</html>
