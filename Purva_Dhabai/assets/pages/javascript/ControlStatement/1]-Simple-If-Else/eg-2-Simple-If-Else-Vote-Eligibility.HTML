<html>
    <title>Conditional Statement</title>
    <style>
    .container{
        width: 100vw;
        height: 100vh;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: beige;
    }
    input{
        height: 50px;
        width: 300px;
        margin: 10px;   
    }

    .display-box{
        width: 60%;
        height: 200px;
        margin: 10px;
        background-color: rgb(249, 250, 250);
        border: solid 1px black;
        text-align: center;

    }

    h1{
        font-size: 200%;
    }

    button{
        height: 40px;
        width: 200px;
        color: blueviolet;
    }
</style>
    <body>
        <div class="container">
        <h1>JavaScript Class</h1>
        <input type="text" id="input-one" placeholder="Enter Age">
        <button onclick="myFunction()">Click Me</button>
<p class="display-box" id="dis-one"></p>
    </div>
<script>
    function myFunction() {
        let age = Number(document.getElementById("input-one").value);
        if(age >= 18){
            document.getElementById("dis-one").innerHTML = "You are eligible to vote"
    } else {
document.getElementById("dis-one").innerHTML = "You are not eligible to vote"
    }
}
</script>
    </body>
</html>
