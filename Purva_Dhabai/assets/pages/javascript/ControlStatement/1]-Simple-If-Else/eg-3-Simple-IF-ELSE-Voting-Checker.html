<!DOCTYPE html>
<html lang="en">
<head>
    <title>Voting Check</title>
</head>
<style>
    .container{
        width: 100vw;
        height: 100vh;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: rgb(191, 214, 191);
    }

     .display-box{
        width: 60%;
        height: 200px;
        margin: 10px;
        background-color: rgb(249, 250, 250);
        border: solid 1px black;

    }
</style>
<body>

    <div class="container">
        <h2>Voter Eligibility</h2>
        <input type="number" id="input-one" placeholder="Enter Age"><br>
        <button onclick="myFunction()">Check</button>
        <p class="display-box" id="dis-one"></p>
    </div>

    <script>
        function myFunction() {
            let age = Number(document.getElementById("input-one").value);
            if(age >= 18){
                document.getElementById("dis-one").innerHTML = "You are eligible to vote";
            } else {
                document.getElementById("dis-one").innerHTML = "You are not eligible to vote";
            }
        }
    </script>

</body>
</html>
