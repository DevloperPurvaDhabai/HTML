<!DOCTYPE html>
<html lang="en">
<head>
    <title>Voting Check</title>
</head>
<style>
    .container{
        width: 100vw;
        height: 100vh;
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: rgb(191, 214, 191);
    }

     .display-box{
        width: 40%;
        height: 200px;
        margin: 10px;
        background-color: rgb(249, 250, 250);
        border: solid 1px black;
        text-align: center;
     }

        .box-one{
            height: 35%;
            width: 30%;
            align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: rgb(240, 205, 243);
        border: 10px solid rgb(71, 70, 70);
border-radius: 5px;
        }

        

    
</style>
<body>

    <div class="container">
        <div class="box-one">
        <h2>Electricity Unit</h2>
        <input type="number" id="input-one" placeholder="Enter temperature"><br>
        <button onclick="myFunction()">Check</button>
        <p class="display-box" id="dis-one"></p>
        </div>
    </div>

    <script>
        function myFunction() {
            let unit = Number(document.getElementById("input-one").value);
            if(unit <= 50){
                document.getElementById("dis-one").innerHTML = "Bill : " + unit * 8;
            } else if(unit <= 150){
                document.getElementById("dis-one").innerHTML = "Bill : " + unit * 10;
            } else if(unit <= 250){
                document.getElementById("dis-one").innerHTML = "Bill : "+ unit * 12;
            } else {
                document.getElementById("dis-one").innerHTML = "Bill : " + unit * 15;
            }
        }
    </script>

</body>
</html>
